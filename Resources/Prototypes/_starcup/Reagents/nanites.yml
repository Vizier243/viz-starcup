- type: reagent
  id: OverclockNanites
  name: reagent-name-overclock-nanites
  group: Nanites
  desc: reagent-desc-overclock-nanites
  physicalDesc: reagent-physical-desc-metallic
  contrabandSeverity: Traitor
  flavor: plastic
  color: "#333333"
  metabolisms:
    Bloodstream:
      effects:
      # Main effects
      - !type:MovementSpeedModifier
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ MKC ]
        walkSpeedModifier: 1.25
        sprintSpeedModifier: 1.25
      - !type:ModifyStatusEffect
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ MKC ]
        effectProto: StatusEffectStimulantsStamina
        time: 3
      - !type:ModifyStatusEffect
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ MKC ]
        effectProto: StatusEffectStunned
        time: 3.5
        type: Remove
      - !type:ModifyKnockdown
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ MKC ]
        time: 3.5
        type: Remove
      - !type:ModifyStatusEffect
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ MKC ]
        effectProto: StatusEffectForcedSleeping
        time: 3
        type: Remove
      - !type:GenericStatusEffect
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ MKC ]
        key: Adrenaline
        component: IgnoreSlowOnDamage
        time: 3
      # Side effects
      - !type:Jitter
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ MKC ]
      # OD
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Stimulants
          min: 45
        - !type:MetabolizerTypeCondition
          type: [ MKC ]
        damage:
          types:
            Shock: 3
      # Main effects
      - !type:ModifyBleed
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ MKC ]
        amount: -1.5
      - !type:EvenHealthChange
        conditions:
        - !type:TotalDamageCondition
          min: 70
        - !type:MetabolizerTypeCondition
          type: [ MKC ]
        damage:
          Burn: -0.5
          Brute: -0.5
