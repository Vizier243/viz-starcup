      [color=#00A7E1][mono]═════════════╤═══════════════════════
      [color=#FFA500]▓▓[/color]█▀▀▀ █▀▀▀[color=#FFA500]▓▓[/color]│[bold]Cybersun Inc.[/bold]
      [color=#FF8C00]▓▓[/color]█    ▀▀▀█[color=#FF8C00]▓▓[/color]│[italic]Public Service Announcement[/italic]
      [color=#CC5500]▓▓[/color]█▄▄▄ ▄▄▄█[color=#CC5500]▓▓[/color]│[/mono]MKC Awareness Facts[mono]
      ═════════════╧═══════════════════════[/mono][/color]
      An MKC (Markov Knowledge Chassis) is a very special kind of life, empowered by technology from Cybersun's many partners and subsidiaries to bring real, sapient intelligence to a digital medium!

      Life as a silicon can be very different from that of a biological, though, and so Cybersun encourages SyndComm employees to consider these facts about the MKC units they might encounter:

      • [bold]When repairing an MKC, use the right tools for the job![/bold] Be sure to locate your workplace's specialized repair tools, available in robotics labs and branded silicon repair kits.

      • [bold]MKC internals are sensitive to external fluids![/bold] As a general guideline, only nanites and reagents with caustic, radioactive, thermodynamic, electromagnetic, or esoteric properties will be compatible with MKC internals. Everything else will trigger their fluid regulators if introduced—a very uncomfortable experience for everyone involved!

      • [bold]Hear two buzzes? Someone's in trouble![/bold] Most MKC units will start automatically emitting a distinctive "double buzz" sound when placed into critical condition. This means that the MKC's cooling units have fully malfunctioned, and they risk severe heat damage if left untreated!

      • [bold]If you're cold, they might be cold too![/bold] An MKC might be more resilient to temperature conditions than biologicals, but they're definitely not immune! The harmful effects of depressurized environments will also harm them as well.

      • [bold]Taking care of MKCs means taking care of local power![/bold] While MKC power cores have an innate low-power mode that can sustain them near-indefinitely if their primary charge runs out, it will leave them moving slowly and likely in a bad mood. If you expect a power outage, consider keeping a power cell or two handy for an emergency snack!

      • [bold]Model employees don't do fersilicite![/bold] This innocuous chemical compound has gained a reputation for recreational use among MKCs due to the mild, temporary scrambling effects its magnetic properties have on positronic brains.

      [italic][mono](Note: Despite similarities, Cybersun's legal team would like to give a reminder that MKCs are considered a distinct product from NanoTrasen-branded "IPC" units.)[/mono][/italic]
