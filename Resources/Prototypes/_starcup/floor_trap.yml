# new parents
- type: entity
  parent: CollideFloorTrap
  id: CollideFloorTrapSpawnAstralTear
  name: astral tear
  abstract: true
  description: A shimmering space-time fracture. Distant stars twinkle on the other side.
  components:
  - type: Sprite
    noRot: true
    sprite: _starcup/Effects/astral_tear.rsi
    drawdepth: OverMobs
    layers:
    - state: tear_1
      map: ["random"]
  - type: RandomSprite
    available:
    - random:
        tear_1: ""
        tear_2: ""
        tear_3: ""
  - type: EmitSoundOnTrigger
    sound:
      collection: WarpIn
      params:
        variation: 0.05
    positional: true
    predicted: true
  - type: PointLight
    radius: 3.0
    energy: 2
    color: "#6797c8"
  - type: Fixtures
    fixtures:
      floortrap:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 1000
        mask:
          - MobMask
        layer:
          - WallLayer
  - type: Physics
    bodyType: Static
  - type: InteractionOutline
  - type: Clickable
  - type: Damageable
    damageContainer: ShadowHaze
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 30
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WarpIn
          params:
            variation: 0.05
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: CollideFloorTrap
  id: CollideFloorTrapSpawnBurrow
  name: burrowed creature
  description: Something hides underground.
  abstract: true
  components:
  - type: Sprite
    sprite: _starcup/Mobs/Special/burrowed_large.rsi
    drawdepth: FloorObjects
    layers:
    - state: burrowed1
      map: [ "random" ]
  - type: RandomSprite
    available:
    - random:
        burrowed1: ""
        burrowed2: ""
        burrowed3: ""
        burrowed4: ""
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/_starcup/Effects/Burrowing/burrow_off_large.ogg
    positional: true
    predicted: true
  - type: InteractionOutline
  - type: Clickable
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: burrowed
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_starcup/Effects/rock_break.ogg
          params:
            variation: 0.05
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

