- type: entity
  save: false
  parent:
  - MobBloodstream
  - MobAtmosStandard
  - MobFlammable
  - BaseSpeciesMob
  id: BaseSpeciesMobSilicon
  abstract: true
  components:
  # begin mirrored components from BaseSpeciesMobOrganic
  # if any components are changed there, they should also be changed here.
  # excluded components: Perishable, Respirator
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.50
        Heat: 0.1
  - type: PassiveDamage
    allowedStates:
    - Alive
    damage:
      types:
        Heat: -0.07
        Blunt: -0.05
        Piercing: -0.05
        Slash: -0.05
  - type: Fingerprint
  - type: Blindable
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42
  - type: TemperatureDamage
    heatDamageThreshold: 325
    coldDamageThreshold: 260
    coldDamage:
      types:
        Cold: 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 1.5 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      293: 0.9
      280: 0.8
      260: 0.7
  - type: ThermalRegulator
    metabolismHeat: 800
    radiatedHeat: 100
    implicitHeatRegulation: 500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 310.15
    thermalRegulationTemperatureThreshold: 2
  - type: FireVisuals
    alternateState: Standing
  - type: StunVisuals
  # end mirrored components from BaseSpeciesMobOrganic
  - type: Tag # mirrored from BaseSpeciesMob
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - SiliconEmotes # added
  - type: Damageable
    damageContainer: HumanoidSilicon
    damageModifierSet: HumanoidSilicon
  - type: ZombieImmune
  - type: Deathgasp
    prototype: SiliconDeathgasp
  - type: RangedDamageSound
    soundGroups:
      Brute:
        collection: MetalBulletImpact
    soundTypes:
      Heat:
        collection: MetalLaserImpact
  - type: Speech
    speechSounds: Pai
  - type: Vocal
    sounds:
      Male: HumanoidSilicon
      Female: HumanoidSilicon
      Unsexed: HumanoidSilicon
  - type: TypingIndicator
    proto: robot
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#DD8822"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: LightningTarget
    priority: 1
    lightningExplode: false
  - type: MobThresholds
    stateAlertDict:
      Alive: BorgHealth
      Critical: BorgCrit
      Dead: BorgDead
