# Spawners by type
- type: entity
  id: RandomFloraTreeDeciduous
  name: random deciduous tree spawner
  parent: MarkerBaseStarcup
  components:
  - type: Sprite
    layers:
      - state: shadowpink
      - state: pink
      - sprite: _starcup/Structures/Nature/Flora/Trees/DeciduousTrees/flora_verdant_trees.rsi
        state: tree01
  - type: RandomSpawner
    prototypes:
      - FloraTreeLarge
      - FloraTree
      - FloraTreeAutumn
      - FloraTreeVerdant
      - FloraTreeTemperate
      - FloraTreeAspbirch
      - FloraTreeDeadBrown
      - FloraTreeDeadPurple
      - FloraTreeTeal
      - FloraTreeLargeTeal
      - FloraTreePink
      - FloraTreeJuniper
    chance: 0.95
    rarePrototypes:
      - ShadowTree
      - FloraTreeLargeDark
    rareChance: 0.05

