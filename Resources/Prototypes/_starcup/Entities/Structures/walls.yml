- type: entity
  parent: BaseWall
  id: WallWoodOrnate
  name: ornate wood wall
  description: The traditional greytide defense.
  components:
  - type: Sprite
    sprite: _Impstation/Structures/Walls/wood.rsi
  - type: Icon
    sprite: _Impstation/Structures/Walls/wood.rsi
  - type: Construction
    graph: Barricade
    node: ornateWoodWall
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:ChangeConstructionNodeBehavior
        node: Barricade
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: IconSmooth
    key: woods
    base: wood
