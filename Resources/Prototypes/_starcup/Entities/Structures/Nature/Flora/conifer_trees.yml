# Upstream conifer variants
- type: entity
  parent: BaseTreeConifer
  id: FloraTreeConiferNoSnow
  name: conifer
  suffix: no snow
  description: Thick and spiny shades of dark in the land white and beige.
  components:
  - type: Sprite
    sprite: _starcup/Structures/Nature/Flora/Trees/ConiferTrees/flora_treesconifer_nosnow.rsi
    layers:
    - state: tree01
      map: ["random"]
  - type: RandomSprite
    available:
    - random:
        tree01: ""
        tree02: ""
        tree03: ""
        tree04: ""
        tree05: ""
        tree06: ""
        tree07: ""
        tree08: ""
        tree09: ""

# Dead trees
- type: entity
  parent: BaseTreeConifer
  id: FloraTreeConiferDead
  name: conifer
  suffix: dead
  description: Nothing lasts forever, but what remains may yet last for a long, long time.
  components:
  - type: Sprite
    sprite: _starcup/Structures/Nature/Flora/Trees/ConiferTrees/flora_dead_conifers.rsi
    layers:
    - state: tree01
      map: ["random"]
  - type: RandomSprite
    available:
    - random:
        tree01: ""
        tree02: ""
        tree03: ""
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: TreeFall
          params:
            volume: 5
            variation: 0.05
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          Log:
            min: 1
            max: 2
          TamarackStump:
            min: 1
            max: 1
        offset: 0

