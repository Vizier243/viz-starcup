# Original trees
- type: entity
  parent: BaseTree
  id: FloraTreeAspbirch
  name: tree
  suffix: aspen birch
  description: The criss-crossed pale wood of this tree, and the leaves that crown it, make it unclear whether it is a son of the aspen, or the birch.
  components:
  - type: Sprite
    sprite: _starcup/Structures/Nature/Flora/Trees/DeciduousTrees/flora_aspen_birches.rsi
    layers:
    - state: tree01
      map: ["random"]
  - type: RandomSprite
    available:
    - random:
        tree01: ""
        tree02: ""
        tree03: ""
        tree04: ""
        tree05: ""
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: TreeFall
          params:
            volume: 5
            variation: 0.05
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          Log:
            min: 2
            max: 6
          AspenStump:
            min: 1
            max: 1
        offset: 0
  - type: SolutionContainerManager
    solutions:
      pool:
        maxVol: 45
        reagents:
        - ReagentId: Sap
          Quantity: 45
  - type: SolutionRegeneration
    solution: pool
    generated:
      reagents:
      - ReagentId: Sap
        Quantity: 0.1

