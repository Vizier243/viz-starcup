# Extensively modified RMC prototypes.
- type: entity
  parent: BaseRock
  id: FloraBoulderRed
  name: boulder
  suffix: red
  description: A large rock. It's not cooking anything.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Flora/boulder.rsi
    layers:
    - state: boulder1
      map: ["random"]
  - type: RandomSprite
    available:
    - random:
        boulder1: ""
        boulder2: ""
        boulder3: ""

- type: entity
  parent: BaseRock
  id: FloraBoulderLargeRed
  name: boulder
  suffix: large, red
  description: A large rock. It's not cooking anything.
  placement:
    mode: SnapgridBorder
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Flora/boulder_large.rsi
    layers:
    - state: boulder_large1
      map: ["random"]
  - type: RandomSprite
    available:
    - random:
        boulder_large1: ""
        boulder_large2: ""
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_starcup/Effects/rock_break.ogg
          params:
            volume: 5
            variation: 0.05
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.8
        density: 1000
        layer:
        - HalfWallLayer
        - Opaque

