- type: gameMap
  id: Reach
  mapName: 'Reach'
  mapPath: /Maps/_starcup/reach.yml
  minPlayers: 0
  maxPlayers: 11
  stations:
    Reach:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Reach Transport {1}'
          nameGenerator:
            !type:SyndicateNameGenerator
            prefixCreator: 'SC'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/_starcup/Shuttles/SYND_EmergencyShuttle.yml # starcup: stock emergency.yml -> stock SYND_EmergencyShuttle.yml
        - type: StationJobs
          availableJobs: # 26 jobs total w/o latejoins, 32 jobs total w/ latejoins
            #command (2)
            Captain: [ 1, 1 ]
            AdministrativeAssistant: [ 1, 1 ]
            HeadOfSecurity: [ 1, 1 ]
            StationAi: [ 1, 1 ]
            #service (6 - 7)
            Bartender: [ 1, 1 ]
            Botanist: [ 1, 1 ]
            Chaplain: [ 1, 1 ]
            Chef: [ 1, 1 ]
            Janitor: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            ServiceWorker: [ 0, 1 ] # no roundstart spawner
            #engineering (3 - 4)
            AtmosphericTechnician: [ 1, 1 ]
            StationEngineer: [ 1, 2 ]
            TechnicalAssistant: [ 1, 1 ]
            #medical (3 - 4)
            Chemist: [ 1, 1 ]
            MedicalDoctor: [ 1, 2 ]
            MedicalIntern: [ 1, 1 ]
            #science (2 - 2)
            ResearchAssistant: [ 1, 1 ]
            Scientist: [ 1, 1 ]
            #security (3 - 5)
            SecurityCadet: [ 1, 1 ]
            SecurityOfficer: [ 1, 3 ]
            Prisoner: [ 1, 1 ]
            #supply (3 - 4)
            CargoAssistant: [ 1, 1 ]
            CargoTechnician: [ 1, 1 ]
            SalvageSpecialist: [ 1, 2 ]
            #civilian (3+)
            Passenger: [ -1, -1 ] #infinite, not counted
            Clown: [ 1, 1 ]
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
