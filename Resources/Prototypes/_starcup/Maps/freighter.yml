- type: gameMap
  id: Freighter
  mapName: 'Freighter'
  mapPath: /Maps/_starcup/freighter.yml
  minPlayers: 0
  maxPlayers: 30
  stations:
    Freighter:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/_starcup/Shuttles/emergency_freighter.yml
        - type: StationCargoShuttle
          path: /Maps/_starcup/Shuttles/cargo_freighter.yml
        - type: StationNameSetup
          mapNameTemplate: '{0} Trimaran-Class Freighter {1}'
          nameGenerator:
            !type:SyndicateNameGenerator
            prefixCreator: '-SC-HWKM'
        - type: StationJobs
          availableJobs: # roundstart is # of beds, latejoin is at most one more
          # command
            Captain: [ 1, 1 ]
            HeadOfSecurity: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            ChiefMedicalOfficer: [ 1, 1 ]
            ChiefEngineer: [ 1, 1 ]
            Quartermaster: [ 1, 1 ]
            ResearchDirector: [ 1, 1 ]
            AdministrativeAssistant: [ 1, 1 ]
            StationAi: [ 1, 1 ]
          # service
            Reporter: [ 1, 1 ]
            Janitor: [ 1, 2 ]
            Bartender: [ 1, 2 ]
            Botanist: [ 1, 2 ]
            Chef: [ 1 , 2 ]
            Musician: [ 1, 1 ]
            Clown: [ 1, 1 ]
            Mime: [ 1, 1 ]
            Lawyer: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            Chaplain: [ 1, 1 ]
            ServiceWorker: [ 1, 2 ]
            Boxer: [ 1, 1 ]
          # engineering
            AtmosphericTechnician: [ 1, 2 ]
            StationEngineer: [ 2, 3 ]
            TechnicalAssistant: [ 1, 2 ]
          # medical
            Chemist: [ 1, 1 ]
            Psychologist: [ 1, 1 ]
            Paramedic: [ 1, 1 ]
            MedicalDoctor: [ 2, 3 ]
            MedicalIntern: [ 1, 2 ]
          # science
            Roboticist: [ 1, 1 ]
            Scientist: [ 2, 3 ]
            ResearchAssistant: [ 1, 2 ]
          # silicon
            Borg: [ 2, 3 ]
          # security
            Warden: [ 1, 1 ]
            Detective: [ 1, 1 ]
            SecurityOfficer: [ 2, 3 ]
            SecurityCadet: [ 1, 2 ]
            Brigmedic: [ 1, 1 ]
            Prisoner: [ 2, 2 ]
          # supply
            SalvageSpecialist: [ 1, 2 ]
            CargoTechnician: [ 2, 3 ]
            Courier: [ 1, 2 ]
            CargoAssistant: [ 1, 2 ]
          # civilian
            Passenger: [ -1, -1 ]
