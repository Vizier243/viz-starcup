- type: entity
  parent: BaseLathe
  id: PrinterDoc
  name: document printer
  description: Bureaucratic perfection, courtesy of Cybersun. Stores a database of all standard SyndComm documents, and lets you print them as long as you have paper. # starcup - syndified
  components:
  - type: Sprite
    sprite: _Corvax/Structures/Machines/printer.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: idle
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Transform
    noRot: false
  - type: Machine
    board: PrinterDocMachineCircuitboard
  - type: Lathe
    producingSound: /Audio/Machines/scanning.ogg
    idleState: icon
    runningState: building
    staticPacks:
    - DocumentPrinterStaticStarcup # starcup
#  - type: EmagLatheRecipes # starcup - commented out for now until we add some
#    emagStaticPacks:
#    - DocumentPrinterStaticEmagImp
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.4,0.25,0.4"
        density: 25
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: MaterialStorage # starcup - we have sheetpaper, why not use it?
#    whitelist:
#      tags:
#      - Document
#    storage: # starcup
#      SheetPrinter: 0
    materialWhiteList: [Paper] # starcup
