- type: entity
  name: Siobhan
  parent: MobArcticFox
  id: MobArcticFoxSiobhan
  description: Her name is pronounced "Shivahn", but she is known as Shivs by her associates. A fluffy, adorable arctic fox.
  components:
  - type: InteractionPopup
    successChance: 1
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 3
  - type: Grammar
    attributes:
      proper: true
      gender: female
  - type: Tag
    tags:
    - CannotSuicide
    - VimPilot
    - CreatureEmotes

- type: entity
  name: Laika
  parent: MobSecDog
  id: MobSecDogLaika
  description: Retired after the Security Uprisings as a hero of the people. Even now she does what she can to help. # starcup. orig: Much like her namesake, Laika is a specimen of indeterminate breed, fresh off the streets and ready to tussle.
  components:
  - type: StaminaDamageOnHit  # starcup start: Laika doesn't need to be as vicious anymore.
    damage: 0
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Effects/bite.ogg
    angle: 0
    attackRate: 0.75
    damage:
      types:
        Slash: 6 # starcup end
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: "Laika"
    description: "The Psych office's canine therapy pet. Emotionally support the crew like the very good girl you are!" # starcup. orig:"Security's resident she-dog. Badger the officers for headpats and nip at the heels of violent offenders."
  - type: GhostTakeoverAvailable
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 2
  - type: Grammar
    attributes:
      proper: true
      gender: female
#  - type: Loadout # starcup: Laika doesn't need this gear in her new role.
#    prototypes: [ MobSecDogLaikaGear ]
  - type: Tag
    tags:
    - CannotSuicide
    - VimPilot
    - DoorBumpOpener
    - CreatureEmotes
#  - type: StealTarget
#    stealGroup: AnimalSecurity # starcup: Laika is not security anymore!

- type: entity
  name: Silvia
  id: MobCobraSilvia
  parent: MobCobraSpace
  description: A charming practitioner of the art of acupuncture. Her alluring gaze has won her many fans. # starcup: eliminating confusion as to her status as a pet vs an enemy
  components:
    - type: HTN
      rootTask:
        task: IdleCompound
    - type: Sprite
      drawdepth: Mobs
      sprite: _DV/Mobs/Pets/silvia.rsi
      layers:
        - map: [ "enum.DamageStateVisualLayers.Base" ]
          state: silvia
        - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
          state: glow
          shader: unshaded
    - type: FootstepModifier
      footstepSoundCollection:
        collection: FootstepSnake
    - type: MobThresholds
      thresholds:
        0: Alive
        125: Dead
    - type: DamageStateVisuals
      states:
        Alive:
          Base: silvia
          BaseUnshaded: glow
        Dead:
          Base: dead_silvia
    - type: Butcherable
      spawned:
        - id: FoodMeatSnakeSilvia
          maxAmount: 3
        - id: ClothingShoesSnakeskinBoots #different version? wysi
          amount: 1
          prob: 0.2
    - type: Bloodstream
      bloodReferenceSolution: #starcup
        reagents:
        - ReagentId: Cryoxadone
          Quantity: 200
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.40
          density: 120
          mask:
          - MobMask
          layer:
          - MobLayer
    - type: MeleeWeapon
      attackRate: 1.75 #faster attack rate to compensate for healing in self defense situations
      hidden: true
      soundHit:
        path: /Audio/Effects/bite.ogg
      angle: 0
      animation: WeaponArcBite
      damage:
        types:
          Piercing: 6 #take dmg to heal dmg
    - type: SolutionContainerManager
      solutions:
        melee:
          maxVol: 30
          reagents:
          - ReagentId: Omnizine
            Quantity: 30 #5 bites to heal 90hp/1 min
    - type: MeleeChemicalInjector
      solution: melee
      transferAmount: 6 #heals 24 burn/brute/air/toxin in 12seconds/minus 6 brute per bite
    - type: SolutionRegeneration
      solution: melee
      duration: 30 #regen 1u every 30 seconds. 15 mins to full
      generated:
        reagents:
        - ReagentId: Omnizine
          Quantity: 1
    - type: ReplacementAccent
      accent: xeno #Add cool snake accent later. wyci
    - type: PointLight
      radius: 1.3
      energy: 1
      color: "#ff6600" # starcup: differentiating from enemy snakes. chemistry orange!
    - type: Stealth
      enabledOnDeath: false
      maxVisibility: 1.2
    - type: StealthOnMove
      passiveVisibilityRate: -0.15
      movementVisibilityRate: 0.65
    - type: GhostRole
      makeSentient: true
      allowSpeech: true
      allowMovement: true
      name: ghost-role-information-silvia-name
      description: ghost-role-information-silvia-description
      rules: ghost-role-information-silvia-rules
#      requirements: #No raiders # starcup: we aren't on the server browser!
#      - !type:DepartmentTimeRequirement
#        department: Medical
#        time: 14400 #4 hours
    - type: GhostTakeoverAvailable
    - type: InteractionPopup
      successChance: 0.65
      interactSuccessString: petting-success-snake
      interactFailureString: petting-failure-generic
      interactSuccessSpawn: EffectHearts
      interactSuccessSound:
        path: /Audio/Animals/snake_hiss.ogg
    - type: NpcFactionMember
      factions:
        - Passive # starcup: hostiles attacking silvia feels weird when she doesn't fight back and has healing attacks anyways
    - type: Grammar
      attributes:
        proper: true
        gender: female
    - type: Tag
      tags:
      - CannotSuicide
      - VimPilot
      - DoorBumpOpener
      - FootstepSound
      - CreatureEmotes
#    - type: StealTarget
#      stealGroup: AnimalSilvia
