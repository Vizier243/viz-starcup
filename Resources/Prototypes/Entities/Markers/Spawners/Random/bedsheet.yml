- type: entity
  name: Random Sheet Spawner
  id: BedsheetSpawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Misc/bedsheets.rsi
      state: random_bedsheet
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - !type:GroupSelector
        weight: 97
        prob: 0.97
        children:
        - id: BedsheetBlue
        - id: BedsheetYellow
        - id: BedsheetOrange
        - id: BedsheetGreen
        # - id: BedsheetNT # starcup: removed for syndicate rebranding ops
        - id: BedsheetSyndie  #starcup: added for syndicate rebranding ops
        - id: BedsheetRed
        # - id: BedsheetUSA # starcup: remove
        - id: BedsheetBrown
        - id: BedsheetBlack
        - id: BedsheetPurple
        - id: BedsheetGrey
        - id: BedsheetWhite
        - id: BedsheetRainbow
      - !type:GroupSelector
        weight: 3
        children:
        - id: BedsheetIan
        - id: BedsheetCosmos
    offset: 0
