- type: entity
  id: RandomFloraTree
  name: random tree spawner
  parent: MarkerBaseStarcup # starcup
  components:
  - type: Sprite
    layers:
      - state: shadowred # starcup
      - state: red
      - sprite: Objects/Decoration/Flora/flora_trees.rsi
        state: tree01
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      # starcup: more trees - make group
      - !type:GroupSelector
        weight: 5
        children:
        - id: ShadowTree
      # begin starcup: feat. more tress & flora
        - id: FloraTreeLargeDark
        - id: FloraTreeHollowBase
      # end starcup
      - !type:GroupSelector
        weight: 95
        prob: 0.95
        children:
        - id: FloraTreeLarge
        - id: FloraTreeConifer
        - id: FloraTreeSnow
        - id: FloraTree
        # begin starcup: feat. more tress & flora
        - id: FloraTreeAutumn
        - id: FloraTreeVerdant
        - id: FloraTreeTemperate
        - id: FloraTreeAspbirch
        - id: FloraTreeDeadBrown
        - id: FloraTreeDeadPurple
        - id: FloraTreeConiferDead
        - id: FloraTreeTeal
        - id: FloraTreeLargeTeal
        - id: FloraTreePalm
        - id: FloraTreeLargePalm
        - id: FloraTreePink
        - id: FloraTreeJuniper
        - id: FloraTreeCorsicanPine
        - id: FloraTreeConiferNoSnow
        - id: FloraTreeGulmorePine
        - id: FloraTreeTamarack
        - id: FloraTreeAjorax
        - id: FloraTreeLargeAjorax
        # end starcup
