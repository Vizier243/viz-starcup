- type: entity
  id: Bookshelf
  parent: BaseStructure
  name: "bookshelf"
  description: Mostly filled with books.
  components:
  - type: Sprite
    sprite: Structures/Furniture/bookshelf.rsi
    snapCardinals: true
    layers:
      - state: base
      - state: book-0
      - map: ["enum.StorageFillLayers.Fill"]
        # begin Funky Station
      - state: paper
        sprite: Structures/Furniture/bookshelf.rsi
        map: [ "enum.PaperLabelVisuals.Layer" ]
  - type: GenericVisualizer
    visuals:
      enum.PaperLabelVisuals.HasLabel:
        enum.PaperLabelVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
      enum.PaperLabelVisuals.LabelType:
        enum.PaperLabelVisuals.Layer:
          Paper: { state: paper }
          PaperDyedPink: { state: PaperDyedPink }
          PaperDyedRed: { state: PaperDyedRed }
          PaperDyedOrange: { state: PaperDyedOrange }
          PaperDyedYellow: { state: PaperDyedYellow }
          PaperDyedGrass: { state: PaperDyedGrass }
          PaperDyedGreen: { state: PaperDyedGreen }
          PaperDyedOcean: { state: PaperDyedOcean }
          PaperDyedSky: { state: PaperDyedSky }
          PaperDyedPurple: { state: PaperDyedPurple }
          PaperDyedTan: { state: PaperDyedTan }
          PaperDyedBrown: { state: PaperDyedBrown }
# end Funky Station
  - type: Appearance
  - type: StorageFillVisualizer
    maxFillLevels: 21
    fillBaseName: book
  - type: Damageable
    damageModifierSet: Wood
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger: # Excess damage, don't spawn entities
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 2
            max: 3
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Tag
    tags:
    - Structure
    - Wooden
  - type: Transform
    anchored: true
    noRot: true
  - type: Physics
    bodyType: Static
  - type: Anchorable
  - type: Pullable
  - type: Occluder
  - type: Storage
    grid: # Funky Station - changed from 0,0,9,3
    - 0,0,9,1
    - 0,3,9,4
    - 0,6,9,7
    maxItemSize: Normal
    whitelist:
      tags:
        - Document
        - Folder
        - Write
        - Book
        - Spellbook
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: InteractionOutline
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
      paper_label: !type:ContainerSlot # Funky Station
  - type: Construction
    graph: Bookshelf
    node: bookshelf
  - type: BlockWeather
# begin Funky Station
  - type: ItemSlots
  - type: PaperLabel
    labelSlot:
      insertVerbText: comp-paper-label-insert
      ejectVerbText: comp-paper-label-eject
      whitelist:
        components:
        - Paper
      blacklist:
        tags:
        - Book
# end Funky Station
