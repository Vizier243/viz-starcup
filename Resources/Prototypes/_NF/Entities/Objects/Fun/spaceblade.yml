- type: entity
  id: SpaceBlade
  parent: GasTankBase
  name: SpaceBlade
  description: Let it drip!
  abstract: true
  components:
  - type: GasTank
    outputPressure: 0.1
    maxOutputPressure: 0.1
    valveOutputRate: 50
    air:
      volume: 1
      moles:
         Oxygen: 0.4101137219
      temperature: 293.15
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 0.1
        mask:
        - TableMask # Should collide with tables (MidImpassible, Impassible)
        - ItemMask
        - DoorPassable
        layer:
        - DoorPassable
  - type: Item
    size: Small
    sprite: _NF/Objects/Fun/spaceblade.rsi
  - type: Sprite
    sprite: _NF/Objects/Fun/spaceblade.rsi
    state: redorange
    scale: 0.5, 0.5
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/Items/desk_bell_ring.ogg
      params:
        variation: 0.65
        volume: -5
  - type: MeleeWeapon
    damage:
      types:
        Slash: 2

# starcup - added new names and descriptions.

- type: entity
  id: SpaceBladeRedOrange
  parent: SpaceBlade
  name: RedOrange Blade # starcup
  description: "Officially titled \"Fire Blade\", this Blade was dubbed \"RedOrange\" by the community. The content creator who popularized the term explained during an interview: \"FireBlade sounds stupid, and people kept arguing about whether it was red or orange.\"" #Starcup

- type: entity
  id: SpaceBladeBlue
  parent: SpaceBlade
  name: Blue Blade # starcup
  description: "On episode 1 of SpaceBlade, Jimmy Spin is quoted saying \"Wow, I hope mine is green!\" before immediately receieving this." # starcup
  components:
  - type: Sprite
    state: blue

- type: entity
  id: SpaceBladeFrontier
  parent: SpaceBlade
  name: Frontier Blade # starcup
  description: "An advertisement in and of itself, bearing the logo of the Sector where SpaceBlades originated. On the side reads an inscription, \"Let it drip!\"" # starcup
  components:
  - type: Sprite
    state: frontier

- type: entity
  id: SpaceBladeGoldBlue
  parent: SpaceBlade
  name: GoldBlue Blade # starcup
  description: A fancy version of the Blue Blade, released in an attempt to resell unused stock. While it worked extremely well, the build quality was unfortunately questionable, and intact GoldBlues are uncommon. # starcup
  components:
  - type: Sprite
    state: goldblue

- type: entity
  id: SpaceBladeMail
  parent: SpaceBlade
  name: Mail Blade # starcup
  description: These Blades were a company gift from Hawkmoon Acquisitions to its couriers as a reward for exceeding qutoas. Unfortunately, a warehouse full of these was discovered, and their value vanished overnight. # starcup
  components:
  - type: Sprite
    state: mail

- type: entity
  id: SpaceBladeEyeball
  parent: SpaceBlade
  name: Eyeball Blade # starcup
  description: Originally a Halloween exclusive, these Blades were so popular that they became a year-round product. # starcup
  components:
  - type: Sprite
    state: eyeball

- type: entity
  id: SpaceBladeBlade
  parent: SpaceBlade
  name: Blade Blade # starcup
  description: "As the commercial says, \"It's got blades on it!\"" # starcup
  components:
  - type: Sprite
    state: blade

- type: entity
  id: SpaceBladeCheck
  parent: SpaceBlade
  name: Check Blade #starcup
  description: The first Blade to be exclusively available through blindboxes. # starcup
  components:
  - type: Sprite
    state: check

