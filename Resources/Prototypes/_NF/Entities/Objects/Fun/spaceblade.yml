- type: entity
  id: SpaceBladeSec
  parent: SpaceBlade
  name: Security Blade # starcup
  description: When the owner of the SpaceBlade franchise was wrongfully arrested after claims of copyright infringement, he made this Blade out of pure spite. # starcup
  components:
  - type: Sprite
    state: secblade

- type: entity
  id: SpaceBladeContra
  parent: SpaceBlade
  name: Gorlex Blade # starcup
  description: "SpaceBlade's attempt to appeal to its aging audience, this one is the result of a crossover with the controversial Nukies cartoon show. While its somewhat political source raises eyebrows, this Blade is popular for being the only official Blade that is fully cast in metal. On the side reads an engraving, \"Let it reap!\"" # starcup
  components:
  - type: Sprite
    state: contraband
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 0.5
  - type: PointLight
    enabled: true
    radius: 5
    color: "#3db83b"
  - type: StaticPrice
    price: 100

- type: entity
  id: SpaceBladeMoff
  parent: SpaceBlade
  name: Moff Blade # starcup
  description: The result of a crossover episode between SpaceBlade and Safety Moth, in an attempt to increase employee retention. It didn't work, but this is still a cute blade. # starcup
  components:
  - type: Sprite
    state: moff
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Voice/Moth/moth_scream.ogg
  - type: UseDelay
    delay: 2.0
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/Voice/Moth/moth_scream.ogg
      params:
        variation: 0.65
        volume: -5

- type: entity
  id: SpaceBladeWeh
  parent: SpaceBlade
  name: Weh Blade # starcup
  description: Originally a fan-made Blade, the concept was 'accidentally' used in SpaceBlade, episode 21. After community backlash, they agreed to settle it privately with the original creator, though nobody has heard from them since. # starcup
  components:
  - type: Sprite
    state: weh
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Items/Toys/weh.ogg
  - type: UseDelay
    delay: 1.0
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/Items/Toys/weh.ogg
      params:
        variation: 0.65
        volume: -5

- type: entity
  id: SpaceBladeTesla
  parent: SpaceBlade
  name: TeslaBlade # starcup
  description: The first 'Godhood' Blade introduced in the show, prophecy states that whoever wields this blade wields the key to the universe. Whatever that means... # starcup
  components:
  - type: Sprite
    state: tesla
  - type: PointLight
    enabled: true
    radius: 5
    color: "#4080FF"
  - type: Electrified
    shockDamage: 0
    shockTime: 0.8
    requirePower: false
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/Effects/Lightning/lightningshock.ogg
      params:
        variation: 0.65
        volume: -10

- type: entity
  id: SpaceBladePizza
  parent: [SpaceBlade]
  name: Pizza Blade # starcup
  description: This one comes with a scratch-and-sniff...it smells like cardboard. Great. # starcup
  components:
  - type: Sprite
    state: pizza

- type: entity
  id: SpaceBladeSingularity
  parent: SpaceBlade
  name: Singularity Blade # starcup
  description: The second 'Godhood' Blade, this one is destined to consume all of reality. It was revealed in the season finale of SpaceBlade, as a cliffhanger for season 2. # starcup
  components:
  - type: Sprite
    state: singularity
  - type: SingularityDistortion
    intensity: 500
    falloffPower: 5
  - type: GravityAnomaly
  - type: GravityWell
    baseRadialAcceleration: 1
    maxRange: 1

- type: entity
  id: SpaceBladeClown
  parent: SpaceBlade
  name: Honk Blade # starcup
  description: "Released on April Fools day with the simple advertisement: \"Slippery when wet.\"" # starcup
  components:
  - type: Sprite
    state: clown
  - type: Slippery
    slipData:
      knockdownTime: 0.5
      launchForwardsMultiplier: 2
  - type: StepTrigger
    intersectRatio: 0.2
  - type: CollisionWake
    enabled: false
  - type: GasTank
    outputPressure: 0.1
    maxOutputPressure: 0.1
    valveOutputRate: 50
    air:
      volume: 1
      moles:
         NitrousOxide: 0.4101137219
      temperature: 293.15
