      path: /Audio/_starcup/Effects/soft_thumps.ogg
    ThumpTailLoud:
      path: /Audio/Voice/Reptilian/reptilian_tailthump.ogg
    # end starcup
    Gasp:
      path: /Audio/_starcup/Animals/Lizard/lizard_gasp.ogg # starcup
    DefaultDeathgasp:
      collection: DeathGasp

