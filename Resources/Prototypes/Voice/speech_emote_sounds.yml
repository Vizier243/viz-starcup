- type: emoteSounds
  id: MaleReptilian
  params:
    variation: 0.125
  sounds:
    Scream:
      path: /Audio/Voice/Reptilian/reptilian_scream.ogg
    Hiss: # Imp edit
      collection: ReptilianHiss
    Chirp: # Imp addition
      collection: ReptilianChirp
    Laugh:
      path: /Audio/Animals/lizard_happy.ogg
    Honk:
      collection: BikeHorn
    Whistle:
      collection: Whistles
    Crying:
      path: /Audio/_starcup/Animals/Lizard/lizard_whimper.ogg # starcup
    Weh:
      collection: Weh
    Hew:
      collection: Hew
    # Begin DeltaV Additions
    Cough:
      collection: MaleCoughs
    Sneeze:
      collection: MaleSneezes
    Sigh:
      collection: MaleSigh
    Yawn:
      collection: MaleYawn
    # End DeltaV Additions
